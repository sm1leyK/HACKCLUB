<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HACKLUB — Logo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  background:#000;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}

/* draw-on stroke */
.mob-stroke{
  fill:none;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.mob-outer{
  stroke:rgba(255,255,255,.92);
  stroke-width:3;
  filter:drop-shadow(0 0 14px rgba(255,255,255,.35));
}
.mob-inner{
  stroke:rgba(255,255,255,.28);
  stroke-width:1.2;
}

/* filled quads fade in after draw */
.mob-fill{opacity:0;transition:opacity .9s ease}
.mob-fill.show{opacity:1}

/* slow spin after reveal */
#mg{transform-origin:50% 50%}
#mg.spin{animation:spin 14s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ambient glow */
#glow{
  position:absolute;
  width:100%;height:100%;
  background:radial-gradient(ellipse 60% 40% at 50% 50%,
    rgba(255,255,255,.06) 0%,transparent 65%);
  opacity:0;animation:gIn 1.2s ease .5s both;
  pointer-events:none;
}
@keyframes gIn{to{opacity:1}}

/* breathing glow after reveal */
#glow.breathe{animation:breathe 3s ease-in-out infinite alternate}
@keyframes breathe{
  from{opacity:.5;transform:scale(.95)}
  to{opacity:1;transform:scale(1.05)}
}

#wrap{position:relative;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<div id="wrap">
  <div id="glow"></div>
  <svg id="mobius" xmlns="http://www.w3.org/2000/svg">
    <g id="mg"></g>
  </svg>
</div>

<script>
(function(){
  const NS = 'http://www.w3.org/2000/svg';

  // ── size: fill viewport nicely ──
  const vw = window.innerWidth, vh = window.innerHeight;
  const size = Math.min(vw, vh) * 0.88;
  const W_SVG = size * 1.5, H_SVG = size;
  const CX = W_SVG / 2, CY = H_SVG / 2;
  const SCALE = size * 0.31;

  const svg = document.getElementById('mobius');
  svg.setAttribute('viewBox', `0 0 ${W_SVG} ${H_SVG}`);
  svg.style.width  = W_SVG + 'px';
  svg.style.height = H_SVG + 'px';

  const g = document.getElementById('mg');

  // ── Möbius params ──
  const R = 1.0, HALF_W = 0.40, N = 100;
  const RX = 28 * Math.PI / 180;
  const RZ = 10 * Math.PI / 180;
  const FOV = 4.5;

  function rotX(x,y,z){
    return {x, y: y*Math.cos(RX)-z*Math.sin(RX), z: y*Math.sin(RX)+z*Math.cos(RX)};
  }
  function rotZ(p){
    return {
      x: p.x*Math.cos(RZ)-p.y*Math.sin(RZ),
      y: p.x*Math.sin(RZ)+p.y*Math.cos(RZ),
      z: p.z
    };
  }
  function project(s, t){
    const x = (R + t*Math.cos(s/2))*Math.cos(s);
    const y = (R + t*Math.cos(s/2))*Math.sin(s);
    const z = t*Math.sin(s/2);
    let p = rotX(x,y,z);
    p = rotZ(p);
    const sc = SCALE * FOV / (FOV + p.z);
    return { sx: CX + p.x*sc, sy: CY + p.y*sc, z: p.z };
  }

  // ── build & sort quads ──
  const quads = [];
  const clamp = v => Math.max(0, Math.min(1, v));
  for(let i=0; i<N; i++){
    const s0 = (i/N)*2*Math.PI, s1 = ((i+1)/N)*2*Math.PI;
    const p00=project(s0,-HALF_W), p01=project(s0, HALF_W);
    const p10=project(s1,-HALF_W), p11=project(s1, HALF_W);
    const midZ = (p00.z+p01.z+p10.z+p11.z)/4;
    const brightness = clamp(0.22 + 0.7*((midZ/1.8)+0.5));
    const lum = Math.round(brightness*230);
    quads.push({p00,p01,p10,p11,midZ,lum});
  }
  quads.sort((a,b)=>a.midZ-b.midZ);

  // ── render filled polygons ──
  const fillG = document.createElementNS(NS,'g');
  fillG.setAttribute('class','mob-fill');
  fillG.id = 'fillG';
  quads.forEach(q=>{
    const poly = document.createElementNS(NS,'polygon');
    poly.setAttribute('points',
      [q.p00,q.p01,q.p11,q.p10].map(p=>`${p.sx.toFixed(2)},${p.sy.toFixed(2)}`).join(' ')
    );
    poly.setAttribute('fill', `rgba(${q.lum},${q.lum},${q.lum},0.85)`);
    poly.setAttribute('stroke', `rgba(0,0,0,0.15)`);
    poly.setAttribute('stroke-width', '0.5');
    fillG.appendChild(poly);
  });
  g.appendChild(fillG);

  // ── edge paths ──
  function edgeD(tVal){
    const steps=200;
    return Array.from({length:steps+1},(_,i)=>{
      const s=(i/steps)*2*Math.PI;
      const p=project(s,tVal);
      return (i===0?'M':' L')+`${p.sx.toFixed(1)},${p.sy.toFixed(1)}`;
    }).join('');
  }

  const pOuter = document.createElementNS(NS,'path');
  pOuter.setAttribute('d', edgeD(-HALF_W));
  pOuter.setAttribute('class','mob-stroke mob-outer');
  g.appendChild(pOuter);

  const pInner = document.createElementNS(NS,'path');
  pInner.setAttribute('d', edgeD( HALF_W));
  pInner.setAttribute('class','mob-stroke mob-inner');
  g.appendChild(pInner);

  // ── animate: draw edges, then reveal fill, then spin ──
  function animateEdge(el, delay){
    requestAnimationFrame(()=>{
      const len = el.getTotalLength();
      el.style.strokeDasharray  = len;
      el.style.strokeDashoffset = len;
      void el.getBoundingClientRect();
      el.style.transition = `stroke-dashoffset 1.7s cubic-bezier(.16,1,.3,1) ${delay}s`;
      el.style.strokeDashoffset = '0';
    });
  }
  animateEdge(pOuter, 0.2);
  animateEdge(pInner, 0.45);

  // fill fades in after strokes finish
  setTimeout(()=>{
    document.getElementById('fillG').classList.add('show');
  }, 1900);

  // start spinning + breathing glow after fill appears
  setTimeout(()=>{
    document.getElementById('mg').classList.add('spin');
    document.getElementById('glow').classList.add('breathe');
  }, 2700);

})();
</script>
</body>
</html>
